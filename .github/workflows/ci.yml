name: Frontend CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "ci/**"
      - "chore/**"
      - "tdd/**"
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate quality reports
        run: ./scripts/generate-quality-reports.sh

      - name: Verify quality reports
        run: ./scripts/verify-quality-reports.sh

      - name: Upload frontend quality artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-quality-artifacts
          path: |
            reports
            dist

  docker:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t frontend-bidmart:ci .
